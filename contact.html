<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraSeeds - Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">🌸 FloraSeeds</div>
        <nav class="main-nav">
            <a href="index.html" class="nav-link">Main</a>
            <a href="shop.html" class="nav-link">Seed Shop</a>
            <a href="contact.html" class="nav-link active">Contact</a>
        </nav>
    </header>

    <main class="container">
        <section class="form-section">
            <h1>Contact Us</h1>
            <p>Have questions? Fill out the form and our botanists will get back to you soon.</p>

            <form id="contact-form" class="custom-form" novalidate>
                <div class="form-group">
                    <label for="username">Full Name:</label>
                    <input type="text" id="username" name="username" required minlength="3" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required placeholder="example@gmail.com">
                </div>

                <div class="form-group">
                    <label for="flower-select">Which flower are you interested in?</label>
                    <select id="flower-select" name="flowerSelect">
                        <option value="rose">Rose</option>
                        <option value="tulip">Tulip</option>
                        <option value="sunflower">Sunflower</option>
                        <option value="orchid">Orchid</option>
                        <option value="lavender">Lavender</option>
                        <option value="daisy">Daisy</option>
                    </select>
                </div>

                <div class="form-group inline-group">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Would you like to subscribe to our newsletter?</label>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required minlength="10" placeholder="Please write to us in detail..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Send</button>
            </form>

            <div id="form-feedback" class="feedback-box hidden"></div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 FloraSeeds. All rights reserved.</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
